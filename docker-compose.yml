version: "3.9"

services:
  api-nutricional:
    image: maxlyonel22/api-nutricional:2.0
    container_name: api-nutricional
    ports:
      - "3000:3000"
    env_file:
      - .env  # Referencia al archivo .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT}
    depends_on:
      - db-server
    restart: always

  db-server:
    image: postgres:16
    container_name: db-server
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    restart: always

volumes:
  postgresql-data: